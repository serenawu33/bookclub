<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讀書會倒數</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf8f4;
    --ink: #2c2820;
    --ink-soft: #7a7060;
    --ink-muted: #b5a98a;
    --accent: #8b5e3c;
    --line: #e8e0d0;
    --panel: #f3ede3;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--ink-muted);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
  }

  .title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.4rem;
    text-align: center;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 3rem;
    text-align: center;
    letter-spacing: 1px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--ink-muted);
    margin: 0 auto 3rem;
    opacity: 0.5;
  }

  .countdown {
    display: flex;
    align-items: flex-end;
    gap: clamp(1.5rem, 4vw, 3rem);
    margin-bottom: 3.5rem;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .num {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(52px, 10vw, 80px);
    color: var(--ink);
    line-height: 1;
    min-width: 1.4em;
    text-align: center;
    transition: color 0.3s;
  }

  .num.pulse {
    color: var(--accent);
  }

  .label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--ink-muted);
    font-weight: 300;
  }

  .sep {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 7vw, 56px);
    color: var(--line);
    line-height: 1;
    margin-bottom: 22px;
  }

  .done-msg {
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 3.5rem;
    display: none;
  }

  /* Settings panel */
  .settings-toggle {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 16px;
    border: 1px solid var(--line);
    border-radius: 2px;
    transition: all 0.2s;
    font-family: 'Noto Serif TC', serif;
  }
  .settings-toggle:hover {
    color: var(--ink);
    border-color: var(--ink-muted);
  }

  .settings-panel {
    display: none;
    margin-top: 1.5rem;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.5rem 2rem;
    width: min(360px, 90vw);
  }
  .settings-panel.open { display: block; }

  .settings-panel h3 {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    margin-bottom: 1.2rem;
    font-weight: 400;
  }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .field input[type="text"],
  .field input[type="datetime-local"] {
    width: 100%;
    padding: 8px 10px;
    font-size: 14px;
    font-family: 'Noto Serif TC', serif;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--ink);
    outline: none;
  }
  .field input:focus { border-color: var(--ink-muted); }

  .apply-btn {
    width: 100%;
    padding: 10px;
    margin-top: 0.5rem;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    transition: background 0.2s;
  }
  .apply-btn:hover { background: var(--accent); }

  .hint {
    font-size: 11px;
    color: var(--ink-muted);
    text-align: center;
    margin-top: 2rem;
    letter-spacing: 1px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<p class="eyebrow">書適圈</p>
<h1 class="title" id="display-title">距離下次讀書會</h1>
<p class="subtitle" id="display-sub"></p>
<div class="divider"></div>

<div class="countdown" id="countdown">
  <div class="unit"><span class="num" id="d">00</span><span class="label">天</span></div>
  <div class="sep">·</div>
  <div class="unit"><span class="num" id="h">00</span><span class="label">時</span></div>
  <div class="sep">·</div>
  <div class="unit"><span class="num" id="m">00</span><span class="label">分</span></div>
  <div class="sep">·</div>
  <div class="unit"><span class="num" id="s">00</span><span class="label">秒</span></div>
</div>

<p class="done-msg" id="done">✦ 讀書會開始了 ✦</p>

<button class="settings-toggle" onclick="toggleSettings()">⚙ 設定時間</button>

<div class="settings-panel" id="panel">
  <h3>自訂設定</h3>
  <div class="field">
    <label>標題文字</label>
    <input type="text" id="inp-title" value="距離下次讀書會" placeholder="距離下次讀書會" />
  </div>
  <div class="field">
    <label>副標題（可空白）</label>
    <input type="text" id="inp-sub" placeholder="例：4月份共讀《被討厭的勇氣》" />
  </div>
  <div class="field">
    <label>目標日期與時間</label>
    <input type="datetime-local" id="inp-dt" />
  </div>
  <button class="apply-btn" onclick="applySettings()">套用</button>
</div>

<p class="hint" id="hint-text"></p>

<script>
  let target = null;
  let ticker = null;

  const pad = n => String(Math.floor(n)).padStart(2, '0');

  function tick() {
    if (!target) return;
    const diff = target - Date.now();
    const done = document.getElementById('done');
    const cd = document.getElementById('countdown');

    if (diff <= 0) {
      cd.style.display = 'none';
      done.style.display = 'block';
      clearInterval(ticker);
      return;
    }

    cd.style.display = 'flex';
    done.style.display = 'none';

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    const sEl = document.getElementById('s');
    sEl.classList.add('pulse');
    setTimeout(() => sEl.classList.remove('pulse'), 200);

    document.getElementById('d').textContent = pad(days);
    document.getElementById('h').textContent = pad(hours);
    document.getElementById('m').textContent = pad(mins);
    sEl.textContent = pad(secs);
  }

  function applySettings() {
    const titleVal = document.getElementById('inp-title').value.trim() || '距離下次讀書會';
    const subVal = document.getElementById('inp-sub').value.trim();
    const dtVal = document.getElementById('inp-dt').value;

    document.getElementById('display-title').textContent = titleVal;
    document.getElementById('display-sub').textContent = subVal;

    if (dtVal) {
      target = new Date(dtVal).getTime();
      clearInterval(ticker);
      tick();
      ticker = setInterval(tick, 1000);

      const d = new Date(dtVal);
      const fmt = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      document.getElementById('hint-text').textContent = `目標時間：${fmt}`;
    }

    document.getElementById('panel').classList.remove('open');
  }

  function toggleSettings() {
    document.getElementById('panel').classList.toggle('open');
  }

  // Default: 30 days from now
  const def = new Date(Date.now() + 30*86400000);
  const pad2 = n => String(n).padStart(2,'0');
  document.getElementById('inp-dt').value =
    `${def.getFullYear()}-${pad2(def.getMonth()+1)}-${pad2(def.getDate())}T${pad2(def.getHours())}:${pad2(def.getMinutes())}`;

  target = def.getTime();
  tick();
  ticker = setInterval(tick, 1000);
</script>
</body>
</html>
